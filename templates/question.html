<!DOCTYPE html>
<html>
<head>
    <title>Assessment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #eef2f7, #dbeafe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px 40px;
            width: 65%;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .progress-text {
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            width: {{ (index / total) * 100 }}%;
            background: #2563eb;
        }

        .alert {
            display: none;
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .question {
            font-size: 20px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .option {
            border: 2px solid #e5e7eb;
            padding: 12px 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background: #f0f7ff;
            border-color: #2563eb;
        }
        .dark .option:hover {
    background: #334155;   /* dark gray-blue */
    border-color: #60a5fa;
    color: #e5e7eb;
}
        .dark .option.checked {
            background: #334155;;
            border-color: #60a5fa;
        }
        .option.checked {
            background: #f0f7ff;
            border-color: #60a5fa;
        }
        /* Circle for MCQ */
        .circle {
            width: 18px;
            height: 18px;
            border: 2px solid #2563eb;
            border-radius: 50%;
            margin-right: 12px;
        }

        .circle.checked {
            background: #2563eb;
        }

        /* Square for checkbox */
        .square {
            width: 18px;
            height: 18px;
            border: 2px solid #2563eb;
            margin-right: 12px;
        }

        .square.checked {
            background: #2563eb;
        }

        input {
            display: none;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }
        .theme-btn {
    position: fixed;
    top: 15px;
    right: 20px;
    padding: 8px 14px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
    font-size: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    z-index: 1000;
}


.theme-btn:hover {
    background: #1e40af;
}

/* Dark mode styles */
.dark body {
    background: #0f172a;
    color: white;
}

.dark .card,
.dark .summary,
.dark .question-card {
    background: #1e293b;
    color: white;
}

.dark .option {
    border-color: #475569;
}

.dark .progress-bar {
    background: #334155;
}
/* ================= Question Meta Badges ================= */

.question-meta {
    margin-bottom: 15px;
    font-size: 14px;
}

.meta-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 20px;
    margin-right: 8px;
    font-weight: 600;
    font-size: 13px;
}

/* Light Mode */

.meta-badge.marks {
    background: #e0f2fe;
    color: #0369a1;
}

/* Difficulty Colors */
.meta-badge.easy {
    background: #dcfce7;
    color: #166534;
}

.meta-badge.medium {
    background: #fef9c3;
    color: #854d0e;
}

.meta-badge.hard {
    background: #fee2e2;
    color: #991b1b;
}

/* ================= Dark Mode ================= */

.dark .meta-badge.marks {
    background: #1e3a8a;
    color: #e0f2fe;
}

.dark .meta-badge.easy {
    background: #14532d;
    color: #bbf7d0;
}

.dark .meta-badge.medium {
    background: #78350f;
    color: #fde68a;
}

.dark .meta-badge.hard {
    background: #7f1d1d;
    color: #fecaca;
}
    </style>
</head>

<body>
    
    <div class="card">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    <div class="progress-text">Question {{ index }} / {{ total }}</div>

    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>

    <div class="alert" id="alertBox">
        ⚠ Please select at least one option before continuing.
    </div>

    <form method="post" onsubmit="return validateSelection()">

        <div class="question">{{ question }}</div>

        <div class="question-meta">
            <span class="meta-badge difficulty {{ difficulty|lower }}">
                🏷 {{ difficulty|capitalize }}
            </span>

            <span class="meta-badge marks">
                🎯 {{ max_score }} Mark{% if max_score > 1 %}s{% endif %}
            </span>
        </div>

        {% for opt in options %}
        <div class="option" onclick="selectOption(this)">
            
            {% if qtype == "mcq" %}
                <div class="circle"></div>
                <input type="radio" name="option" value="{{ opt }}">
            {% else %}
                <div class="square"></div>
                <input type="checkbox" name="option" value="{{ opt }}">
            {% endif %}

            {{ opt }}
        </div>
        {% endfor %}

        <button type="submit">Next</button>
    </form>

</div>

<script>
    const alertBox = document.getElementById("alertBox");

    function selectOption(element) {
        const input = element.querySelector("input");
        const indicator = element.querySelector(".circle, .square");
        const allOptions = document.querySelectorAll(".option");

        {% if qtype == "mcq" %}
            // clear all first
            allOptions.forEach(opt => {
                opt.classList.remove("checked");
                const ind = opt.querySelector(".circle");
                if (ind) ind.classList.remove("checked");
                opt.querySelector("input").checked = false;
            });

            input.checked = true;
            element.classList.add("checked");
            indicator.classList.add("checked");

        {% else %}
            // toggle for checkbox
            input.checked = !input.checked;
            element.classList.toggle("checked");
            indicator.classList.toggle("checked");
        {% endif %}
    }

    function validateSelection() {
        const inputs = document.querySelectorAll("input");
        let selected = false;

        inputs.forEach(input => {
            if (input.checked) selected = true;
        });

        if (!selected) {
            alertBox.style.display = "block";
            return false;
        }

        return true;
    }

    const themeBtn = document.getElementById("themeBtn");

function setThemeIcon() {
    if (document.documentElement.classList.contains("dark")) {
        themeBtn.innerText = "☀️";
    } else {
        themeBtn.innerText = "🌙";
    }
}

function toggleTheme() {
    const html = document.documentElement;
    html.classList.toggle("dark");

    if (html.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }

    setThemeIcon();
}

window.onload = function() {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
        document.documentElement.classList.add("dark");
    }
    setThemeIcon();
};
</script>

</body>
</html>
